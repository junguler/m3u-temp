name: test
on:
  push
jobs:
  automated-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@main

      - name: run commands
        run: |
          #node ./m3u-checker.js test_input/ test_output/ --quiet
          for i in $(cat countries.txt) ; do for j in "" /page/{2..5} ; do curl -s https://tingfm.com/country/$(echo $i | awk -F '___' '{print $1}')$j | ./htmlq -a href a | grep '/radio/' | awk -F '/' '{print $5}' >> A-$(echo $i | awk -F '___' '{print $2}').txt ; echo -e "$i - $j" ; done ; done
          #rm mep1

      - name: git stuff
        run: |
          git config --local user.email "action[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "$(od -An -tx4 -w16 -N16 /dev/urandom | cut -c2- | tr '[:lower:]' '[:upper:]')"
          git push
