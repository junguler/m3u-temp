name: test
on:
  push
jobs:
  automated-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@main

      - name: run commands
        run: |
          for i in $(cat stations.txt) ; do curl -s https://wavelyradio.cz/app/station/$i > mep1 ; u=$(grep data-url mep1 | head -n1 | awk -F '"' '{print $2}') ; l=$(grep data-logo mep1 | head -n1 | awk -F '"' '{print $2}') ; t=$(grep data-name mep1 | head -n1 | awk -F '"' '{print $2}') ; [ -z "$u" ] && continue ; for tag in $(cat mep1 | ./htmlq 'div.flex.flex-wrap.gap-2.mt-4' -t | sed 's| |_|g' | sed 's|__||g' | awk NF) ; do f="$tag.m3u"; [ -f "$f" ] || echo "#EXTM3U" > "$f" ; echo "#EXTINF:-1 tvg-logo=\"$l\",$t" >> "$f" ; echo "$u" >> "$f" ; echo $i ; done ; done
          rm mep1
          #node ./m3u-checker.js test_input/ test_output/ --quiet

      - name: git stuff
        run: |
          git config --local user.email "action[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "$(od -An -tx4 -w16 -N16 /dev/urandom | cut -c2- | tr '[:lower:]' '[:upper:]')"
          git push
